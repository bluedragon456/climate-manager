name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate version input
        run: |
          python - <<'PY'
          import re
          import sys

          version = "${{ github.event.inputs.version }}"
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print(f"Invalid version: {version}")
              sys.exit(1)
          print(f"Version OK: {version}")
          PY

      - name: Validate manifest and required keys
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest_path = Path("custom_components/climate_manager/manifest.json")
          if not manifest_path.exists():
              print("manifest.json not found")
              sys.exit(1)

          data = json.loads(manifest_path.read_text(encoding="utf-8"))

          required = ["domain", "name", "version"]
          missing = [k for k in required if k not in data]
          if missing:
              print(f"manifest.json missing keys: {missing}")
              sys.exit(1)

          if data.get("config_flow") is not True:
              print("manifest.json must include: \"config_flow\": true")
              sys.exit(1)

          if data.get("domain") != "climate_manager":
              print(f"Unexpected domain: {data.get('domain')}")
              sys.exit(1)

          print("manifest.json looks good")
          PY

      - name: Update manifest version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = "${{ github.event.inputs.version }}"
          manifest_path = Path("custom_components/climate_manager/manifest.json")

          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          data["version"] = version
          manifest_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          print(f"Updated manifest.json to {version}")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add custom_components/climate_manager/manifest.json
          git commit -m "Release v${{ github.event.inputs.version }}" || echo "No changes to commit"

      - name: Create and push tag
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin main
          git push origin "v${{ github.event.inputs.version }}"

      - name: Build release zip
        run: |
          mkdir -p release
          cd custom_components
          zip -r ../release/climate_manager.zip climate_manager

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: release/climate_manager.zip
